name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2
      - name: Check formatting
        run: zig fmt --check src/

  build-test:
    needs: format-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows x86_64
          - os: macos-14
            name: macOS ARM64
          - os: ubuntu-latest
            name: Linux x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v1
        with:
          version: 0.15.2

      # D-22: Cache Zig build artifacts
      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            zig-out
          key: ${{ runner.os }}-zig-${{ hashFiles('build.zig.zon') }}
          restore-keys: |
            ${{ runner.os }}-zig-

      - name: Build
        run: zig build

      # D-21: Verify --version flag works
      - name: Verify --version
        run: ./zig-out/bin/pterm --version
        shell: bash

      # D-41: Unit tests run in Debug mode (default optimize)
      - name: Unit tests
        run: zig build test

      # D-34: Install additional shells for E2E tests
      - name: Install nushell
        uses: hustcer/setup-nu@v3
        with:
          version: '*'

      - name: Install fish (macOS)
        if: runner.os == 'macOS'
        run: brew install fish

      - name: Install fish and zsh (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fish zsh

      # D-31: E2E tests
      - name: E2E tests
        run: zig build test-e2e
