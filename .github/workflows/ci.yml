name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  format-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2
      - name: Check formatting
        run: zig fmt --check src/ tests/

  build-test:
    needs: format-check
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            name: Windows x86_64
          - os: macos-14
            name: macOS ARM64
          - os: ubuntu-latest
            name: Linux x86_64
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: 0.15.2

      - name: Cache Zig build artifacts
        uses: actions/cache@v4
        with:
          path: |
            .zig-cache
            zig-out
          key: ${{ runner.os }}-zig-${{ hashFiles('build.zig.zon', 'build.zig', 'src/**/*.zig') }}
          restore-keys: |
            ${{ runner.os }}-zig-

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libgl-dev libfontconfig-dev

      - name: Build
        run: zig build

      - name: Verify --version
        run: ./zig-out/bin/pterm --version
        shell: bash

      - name: Unit tests
        run: zig build test

      - name: Install nushell
        uses: hustcer/setup-nu@v3
        with:
          version: '*'

      - name: Install fish (macOS)
        if: runner.os == 'macOS'
        run: brew install fish

      - name: Install fish and zsh (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y fish zsh

      - name: E2E tests
        if: runner.os == 'Linux'
        run: zig build test-e2e
        timeout-minutes: 10
