name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write # Required for creating GitHub releases

env:
  ZIG_VERSION: "0.15.2"

jobs:
  # Job 1: Windows x86_64
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history for changelog

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build (ReleaseSafe)
        # Pin CPU to x86_64_v3 (AVX2) so the release binary runs on any
        # Intel Haswell-or-newer / AMD Excavator-or-newer CPU. Without this
        # Zig would use the GitHub runner's native CPU, which may emit
        # AVX-512 instructions that crash on consumer-grade hardware.
        run: zig build --release=safe -Dcpu=x86_64_v3 "-Dversion=${{ steps.version.outputs.VERSION }}"

      - name: Unit tests
        run: zig build test

      - name: Create portable .zip
        shell: bash
        run: |
          mkdir -p release
          cp zig-out/bin/pterm.exe release/
          cp LICENSE release/
          cd release && 7z a ../pterm-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip *

      - name: Note on PDB debug symbols
        shell: bash
        run: |
          echo "Zig ReleaseSafe automatically produces PDB files on Windows."
          echo "PDB is co-located with the binary in zig-out/bin/pterm.pdb"
          ls -la zig-out/bin/pterm.pdb 2>/dev/null || echo "PDB not found (may vary by Zig version)"

      - name: Build MSI
        shell: bash
        run: |
          dotnet tool install --global wix --version 4.*
          cp zig-out/bin/pterm.exe packaging/wix/
          cd packaging/wix
          wix build pterm.wxs -d Version=${{ steps.version.outputs.VERSION }} -d SourceDir=. -out ../../pterm-${{ steps.version.outputs.VERSION }}-windows-x86_64.msi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            pterm-*.zip
            pterm-*.msi

  # Job 2: macOS ARM64
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build (ReleaseSafe)
        run: zig build --release=safe "-Dversion=${{ steps.version.outputs.VERSION }}"

      - name: Unit tests
        run: zig build test

      - name: Separate debug symbols
        run: |
          dsymutil zig-out/bin/pterm -o pterm.dSYM
          tar -czf pterm.dSYM.tar.gz pterm.dSYM

      - name: Strip binary
        run: strip zig-out/bin/pterm

      - name: Create .app bundle and .dmg
        run: bash packaging/macos/create-app-bundle.sh ${{ steps.version.outputs.VERSION }}

      - name: Create tar.gz
        run: |
          mkdir -p release
          cp zig-out/bin/pterm release/
          cp LICENSE release/
          tar -czf pterm-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.gz -C release .

      - name: Upload macOS ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            pterm-*.dmg
            pterm-*.tar.gz
            pterm.dSYM.tar.gz

  # Job 3: Linux x86_64
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libx11-dev libxcursor-dev libxrandr-dev libxinerama-dev libxi-dev libgl-dev libfontconfig-dev

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Build (ReleaseSafe)
        # Pin CPU to x86_64_v3 (AVX2) — see Windows job for rationale.
        run: zig build --release=safe -Dcpu=x86_64_v3 "-Dversion=${{ steps.version.outputs.VERSION }}"

      - name: Separate debug symbols
        run: |
          objcopy --only-keep-debug zig-out/bin/pterm pterm.debug
          objcopy --strip-all --add-gnu-debuglink=pterm.debug zig-out/bin/pterm

      - name: Unit tests
        run: zig build test

      - name: Build .deb and .rpm
        run: |
          sudo gem install fpm
          bash packaging/linux/build-packages.sh ${{ steps.version.outputs.VERSION }} amd64

      - name: Create tar.gz
        run: |
          mkdir -p release
          cp zig-out/bin/pterm release/
          cp packaging/linux/install.sh release/
          cp packaging/linux/pterm.desktop release/
          cp LICENSE release/
          tar -czf pterm-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz -C release .

      - name: Upload Linux x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            pterm-*.tar.gz
            pterm*.deb
            pterm*.rpm
            pterm.debug

  # Job 5: Linux ARM64 cross-compile
  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v2
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Install arm64 cross-compilation dependencies
        run: |
          sudo dpkg --add-architecture arm64
          # Pin existing DEB822 sources (.sources) to amd64 only
          for f in /etc/apt/sources.list.d/*.sources; do
            [ -f "$f" ] && sudo sed -i '/^Architectures:/d' "$f" && sudo sed -i '/^Types:/a Architectures: amd64' "$f"
          done
          # Pin existing legacy sources (.list) to amd64 only
          # Handles: bare lines, lines with [signed-by=...], and skips lines that already have arch=
          for f in /etc/apt/sources.list.d/*.list; do
            [ -f "$f" ] && sudo sed -i -E '/^deb /{/arch=/!{s/\[/[arch=amd64,/;t;s/^deb /deb [arch=amd64] /}}' "$f"
          done
          # Add arm64 sources from ports.ubuntu.com
          CODENAME=$(lsb_release -cs)
          printf 'deb [arch=arm64] http://ports.ubuntu.com/ %s main restricted universe\n' "$CODENAME" | sudo tee /etc/apt/sources.list.d/arm64-ports.list
          printf 'deb [arch=arm64] http://ports.ubuntu.com/ %s-updates main restricted universe\n' "$CODENAME" | sudo tee -a /etc/apt/sources.list.d/arm64-ports.list
          sudo apt-get update
          sudo apt-get install -y libx11-dev:arm64 libxcursor-dev:arm64 libxrandr-dev:arm64 libxinerama-dev:arm64 libxi-dev:arm64 libgl-dev:arm64 libfontconfig-dev:arm64

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Set up cross-compilation prefix
        run: |
          mkdir -p /tmp/aarch64-prefix/include
          ln -s /usr/lib/aarch64-linux-gnu /tmp/aarch64-prefix/lib
          ln -s /usr/include/fontconfig /tmp/aarch64-prefix/include/fontconfig

      - name: Cross-compile for aarch64
        run: zig build -Dtarget=aarch64-linux-gnu --release=safe "-Dversion=${{ steps.version.outputs.VERSION }}" --search-prefix /tmp/aarch64-prefix

      - name: Build .deb and .rpm
        run: |
          sudo gem install fpm
          bash packaging/linux/build-packages.sh ${{ steps.version.outputs.VERSION }} arm64

      - name: Create tar.gz
        run: |
          mkdir -p release
          cp zig-out/bin/pterm release/
          cp packaging/linux/install.sh release/
          cp packaging/linux/pterm.desktop release/
          cp LICENSE release/
          tar -czf pterm-${{ steps.version.outputs.VERSION }}-linux-arm64.tar.gz -C release .

      - name: Upload Linux ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            pterm-*.tar.gz
            pterm*.deb
            pterm*.rpm

  # Final job: Create draft GitHub Release
  create-release:
    needs:
      [
        build-windows,
        build-macos-arm64,

        build-linux-x86_64,
        build-linux-arm64,
      ]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -maxdepth 1 -type f ! -name SHA256SUMS.txt -exec sha256sum {} + > SHA256SUMS.txt
          cat SHA256SUMS.txt

      - name: Generate changelog
        uses: orhun/git-cliff-action@v4
        id: changelog
        with:
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md

      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: CHANGELOG_RELEASE.md
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
