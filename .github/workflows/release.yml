name: Release

on:
  push:
    tags:
      - 'v*'  # D-09: SemVer with v prefix triggers release

permissions:
  contents: write  # Required for creating GitHub releases

env:
  ZIG_VERSION: '0.15.2'

jobs:
  # Job 1: Windows x86_64 (D-23)
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog

      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # D-41: Release builds use ReleaseSafe
      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe -Dversion=${{ steps.version.outputs.VERSION }}

      - name: Unit tests
        run: zig build test

      - uses: hustcer/setup-nu@v3
        with:
          version: '*'

      - name: E2E tests
        run: zig build test-e2e

      # D-08: Portable .zip
      - name: Create portable .zip
        shell: bash
        run: |
          mkdir -p release
          cp zig-out/bin/pterm.exe release/
          cp LICENSE release/
          cd release && 7z a ../pterm-${{ steps.version.outputs.VERSION }}-windows-x86_64.zip *

      # D-14: PDB debug symbols (auto-produced by Zig ReleaseSafe on Windows)
      - name: Note on PDB debug symbols
        shell: bash
        run: |
          echo "Zig ReleaseSafe automatically produces PDB files on Windows."
          echo "PDB is co-located with the binary in zig-out/bin/pterm.pdb"
          ls -la zig-out/bin/pterm.pdb 2>/dev/null || echo "PDB not found (may vary by Zig version)"

      # D-02: MSI installer via WiX v4
      - name: Build MSI
        shell: bash
        run: |
          dotnet tool install --global wix --version 4.*
          cp zig-out/bin/pterm.exe packaging/wix/
          cd packaging/wix
          wix build pterm.wxs -d Version=${{ steps.version.outputs.VERSION }} -out ../../pterm-${{ steps.version.outputs.VERSION }}-windows-x86_64.msi

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-x86_64
          path: |
            pterm-*.zip
            pterm-*.msi

  # Job 2: macOS ARM64 native (D-23)
  build-macos-arm64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # D-41: Release builds use ReleaseSafe
      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe -Dversion=${{ steps.version.outputs.VERSION }}

      - name: Unit tests
        run: zig build test

      - uses: hustcer/setup-nu@v3
        with:
          version: '*'

      - name: Install fish
        run: brew install fish

      - name: E2E tests
        run: zig build test-e2e

      # D-14: Separate debug symbols on macOS
      - name: Separate debug symbols
        run: dsymutil zig-out/bin/pterm -o pterm.dSYM

      - name: Strip binary
        run: strip zig-out/bin/pterm

      # D-03: .app bundle and .dmg
      - name: Create .app bundle and .dmg
        run: bash packaging/macos/create-app-bundle.sh ${{ steps.version.outputs.VERSION }}

      - name: Create tar.gz
        run: |
          mkdir -p release
          cp zig-out/bin/pterm release/
          cp LICENSE release/
          tar -czf pterm-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.gz -C release .

      - name: Upload macOS ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-arm64
          path: |
            pterm-*.dmg
            pterm-*.tar.gz
            pterm.dSYM

  # Job 3: macOS x86_64 cross-compile (D-04, D-24: no tests)
  build-macos-x86_64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # D-04: Cross-compile for x86_64 from ARM64 runner
      - name: Cross-compile for x86_64
        run: zig build -Dtarget=x86_64-macos -Doptimize=ReleaseSafe -Dversion=${{ steps.version.outputs.VERSION }}
      # D-24: No tests -- cross-compiled binary cannot run on ARM64 host

      - name: Create .app bundle and .dmg
        run: bash packaging/macos/create-app-bundle.sh ${{ steps.version.outputs.VERSION }}

      - name: Create tar.gz
        run: |
          mkdir -p release
          cp zig-out/bin/pterm release/
          cp LICENSE release/
          tar -czf pterm-${{ steps.version.outputs.VERSION }}-macos-x86_64.tar.gz -C release .

      - name: Upload macOS x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: macos-x86_64
          path: |
            pterm-*.dmg
            pterm-*.tar.gz

  # Job 4: Linux x86_64 (D-23)
  build-linux-x86_64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # D-41: Release builds use ReleaseSafe
      - name: Build (ReleaseSafe)
        run: zig build -Doptimize=ReleaseSafe -Dversion=${{ steps.version.outputs.VERSION }}

      # D-14: Separate debug symbols on Linux
      - name: Separate debug symbols
        run: |
          zig objcopy --only-keep-debug zig-out/bin/pterm pterm.debug
          zig objcopy --strip-all --add-gnu-debuglink=pterm.debug zig-out/bin/pterm

      - name: Unit tests
        run: zig build test

      - uses: hustcer/setup-nu@v3
        with:
          version: '*'

      - name: Install fish and zsh
        run: sudo apt-get update && sudo apt-get install -y fish zsh

      - name: E2E tests
        run: zig build test-e2e

      # D-05: Build .deb and .rpm via fpm
      - name: Build .deb and .rpm
        run: |
          sudo gem install fpm
          bash packaging/linux/build-packages.sh ${{ steps.version.outputs.VERSION }} amd64

      # D-07: Portable tar.gz with install script
      - name: Create tar.gz
        run: |
          mkdir -p release
          cp zig-out/bin/pterm release/
          cp packaging/linux/install.sh release/
          cp packaging/linux/pterm.desktop release/
          cp LICENSE release/
          tar -czf pterm-${{ steps.version.outputs.VERSION }}-linux-x86_64.tar.gz -C release .

      - name: Upload Linux x86_64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x86_64
          path: |
            pterm-*.tar.gz
            pterm*.deb
            pterm*.rpm
            pterm.debug

  # Job 5: Linux ARM64 cross-compile (D-06, D-24: no tests)
  build-linux-arm64:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: mlugg/setup-zig@v1
        with:
          version: ${{ env.ZIG_VERSION }}

      - name: Extract version
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      # D-06: Cross-compile for aarch64
      - name: Cross-compile for aarch64
        run: zig build -Dtarget=aarch64-linux-gnu -Doptimize=ReleaseSafe -Dversion=${{ steps.version.outputs.VERSION }}
      # D-24: No tests -- cross-compiled binary cannot run on x86_64 host

      - name: Build .deb and .rpm
        run: |
          sudo gem install fpm
          bash packaging/linux/build-packages.sh ${{ steps.version.outputs.VERSION }} arm64

      - name: Create tar.gz
        run: |
          mkdir -p release
          cp zig-out/bin/pterm release/
          cp packaging/linux/install.sh release/
          cp packaging/linux/pterm.desktop release/
          cp LICENSE release/
          tar -czf pterm-${{ steps.version.outputs.VERSION }}-linux-arm64.tar.gz -C release .

      - name: Upload Linux ARM64 artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-arm64
          path: |
            pterm-*.tar.gz
            pterm*.deb
            pterm*.rpm

  # Final job: Create draft GitHub Release (D-26, D-27)
  create-release:
    needs: [build-windows, build-macos-arm64, build-macos-x86_64, build-linux-x86_64, build-linux-arm64]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      # D-27: SHA256SUMS for all release artifacts
      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          sha256sum * > SHA256SUMS.txt
          cat SHA256SUMS.txt

      # D-13: Auto-generated changelog from conventional commits
      - name: Generate changelog
        uses: orhun/git-cliff-action@v3
        id: changelog
        with:
          args: --latest --strip header
        env:
          OUTPUT: CHANGELOG_RELEASE.md

      # D-26: Draft release -- review and publish manually
      - name: Create draft GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          body_path: CHANGELOG_RELEASE.md
          files: |
            artifacts/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
